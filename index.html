<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A FIFA World Cup 2026 sweepstake assignment tool" />

  <title>World Cup 2026 Sweepstake</title>

  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="page-frame setup-view" id="pageFrame">
    <section class="setup-panel" id="setupPanel" aria-labelledby="setupTitle">
      <div class="panel-copy">
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1 id="setupTitle">Sweepstake assigner</h1>
      </div>

      <form class="names-form" id="namesForm">
        <label for="namesInput">Names</label>
        <textarea id="namesInput" name="names" rows="10"
          placeholder="Charles&#10;Laura&#10;Samuel&#10;Alice"></textarea>
        <div class="form-actions">
          <p class="helper-text" id="nameCount">0 people added</p>
          <button type="submit" class="primary-button">
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
            <span>Continue</span>
          </button>
        </div>
      </form>
    </section>

    <section class="draw-panel is-hidden" id="drawPanel" aria-labelledby="drawTitle">
      <header class="draw-header">
        <div>
          <h1 id="drawTitle">Reveal countries</h1>
        </div>

        <div class="draw-actions">
          <button type="button" class="secondary-button" id="backButton">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            <span>Names</span>
          </button>
          <button type="button" class="secondary-button" id="resetButton">
            <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
            <span>Reset</span>
          </button>
          <button type="button" class="download-button is-hidden" id="downloadButton">
            <i class="bi bi-download" aria-hidden="true"></i>
            <span>Download results</span>
          </button>
        </div>
      </header>

      <div class="people-strip" id="peopleStrip" aria-label="Player assignment counts"></div>
      <div class="teams-grid" id="teamsGrid"></div>
    </section>
  </main>

  <template id="teamCardTemplate">
    <article class="team-card">
      <div class="team-top">
        <span class="team-flag" aria-hidden="true"></span>
        <span class="team-group"></span>
        <h2></h2>
      </div>
      <div class="team-bottom">
        <p class="assigned-person">Unassigned</p>
        <button type="button" class="assign-button"><span>Reveal</span></button>
      </div>
    </article>
  </template>

  <script src="scripts.js"></script>
</body>

</html>
